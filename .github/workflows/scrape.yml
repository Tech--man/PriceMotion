name: Daily Price Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scrape.py

      - name: Validate output
        run: |
          python -c "
          import json
          with open('models.json') as f:
              data = json.load(f)
          assert len(data) >= 10, f'Only {len(data)} models, expected at least 10'
          valid = [m for m in data if m.get('inputPrice', -1) >= 0]
          print(f'Validation passed: {len(data)} models total, {len(valid)} with valid prices')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet models.json || (git add models.json && git commit -m "chore: update models.json [skip ci]" && git push)
